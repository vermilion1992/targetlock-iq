<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>TargetLock handover preview</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs" type="module"></script>
    <style>
      body {
        margin: 0;
        background: #525659;
        display: flex;
        justify-content: center;
        padding: 24px;
      }
      canvas {
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
        background: #fff;
      }
    </style>
  </head>
  <body>
    <canvas id="pdf-canvas"></canvas>
    <script type="module">
      import * as pdfjsLib from "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.min.mjs";
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.10.38/pdf.worker.min.mjs";
      const canvas = document.getElementById("pdf-canvas");
      const ctx = canvas.getContext("2d");
      const pdf = await pdfjsLib.getDocument("/pitch-handover-sample.pdf").promise;
      const page = await pdf.getPage(1);
      const scale = 1.5;
      const viewport = page.getViewport({ scale });
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: ctx, viewport }).promise;
    </script>
  </body>
</html>
